<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain Checker — GoDaddy API</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');
  :root {
    --bg: #0a0a0f; --surface: #111118; --border: #1e1e2e;
    --accent: #00ff88; --accent2: #ff3366; --text: #e8e8f0; --muted: #555570;
    --free: #00ff88; --taken: #ff3366; --unknown: #ffaa00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif;
    min-height: 100vh; padding: 40px 20px;
    background-image: radial-gradient(ellipse 60% 40% at 80% 10%, rgba(0,255,136,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 10% 80%, rgba(255,51,102,0.04) 0%, transparent 60%);
  }
  .container { max-width: 860px; margin: 0 auto; }
  header { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 24px; }
  h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
  h1 span { color: var(--accent); }
  .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; }
  .config-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 20px; }
  .config-block h2 { font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 16px; }
  .fields-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-group { display: flex; flex-direction: column; gap: 6px; }
  label { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 0.08em; }
  input[type="text"], input[type="password"], textarea {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
    padding: 10px 14px; width: 100%; outline: none; transition: border-color 0.2s;
  }
  input:focus, textarea:focus { border-color: var(--accent); }
  textarea { height: 160px; resize: vertical; line-height: 1.6; }
  .textarea-hint { font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; color: var(--muted); margin-top: 6px; }
  .btn-row { display: flex; gap: 10px; margin-top: 16px; align-items: center; flex-wrap: wrap; }
  button { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.05em; border: none; border-radius: 8px; cursor: pointer; padding: 12px 28px; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover:not(:disabled) { background: #00ffaa; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,255,136,0.25); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-secondary:hover { color: var(--text); border-color: var(--muted); }
  .progress-bar-wrap { height: 3px; background: var(--border); border-radius: 2px; margin-top: 16px; overflow: hidden; display: none; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; width: 0%; }
  .status-line { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--muted); min-height: 18px; }
  .results-block { display: none; }
  .stats-row { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-pill { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; padding: 6px 14px; border-radius: 100px; font-weight: 600; }
  .stat-free { background: rgba(0,255,136,0.12); color: var(--free); }
  .stat-taken { background: rgba(255,51,102,0.12); color: var(--taken); }
  .stat-total { background: rgba(255,255,255,0.06); color: var(--text); }
  .results-table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
  .results-table th { text-align: left; padding: 8px 14px; color: var(--muted); font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .results-table td { padding: 10px 14px; border-bottom: 1px solid rgba(30,30,46,0.6); vertical-align: middle; }
  .results-table tr:hover td { background: rgba(255,255,255,0.02); }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
  .badge-free { background: rgba(0,255,136,0.15); color: var(--free); }
  .badge-taken { background: rgba(255,51,102,0.15); color: var(--taken); }
  .badge-unknown { background: rgba(255,170,0,0.15); color: var(--unknown); }
  .badge-checking { background: rgba(255,255,255,0.06); color: var(--muted); }
  .copy-btn { padding: 4px 10px; font-size: 0.65rem; border-radius: 4px; background: transparent; border: 1px solid var(--border); color: var(--muted); font-family: 'JetBrains Mono', monospace; font-weight: 400; }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .export-row { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
  .domain-cell { color: var(--text); font-weight: 600; }
  .error-msg { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--taken); background: rgba(255,51,102,0.08); border: 1px solid rgba(255,51,102,0.2); border-radius: 8px; padding: 12px 16px; margin-top: 12px; display: none; }
  @media (max-width: 600px) { .fields-row { grid-template-columns: 1fr; } h1 { font-size: 1.6rem; } }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="subtitle">// godaddy api v1</div>
    <h1>Domain <span>Checker</span></h1>
  </header>

  <div class="config-block">
    <h2>// API credentials</h2>
    <div class="fields-row">
      <div class="field-group">
        <label>API KEY</label>
        <input type="text" id="apiKey" placeholder="вставь сюда API Key">
      </div>
      <div class="field-group">
        <label>API SECRET</label>
        <input type="password" id="apiSecret" placeholder="вставь сюда API Secret">
      </div>
    </div>
  </div>

  <div class="config-block">
    <h2>// список доменов</h2>
    <textarea id="domainsInput" placeholder="example.com&#10;mybrand.io&#10;coolstartup.net&#10;domain&#10;&#10;По одному домену на строку.&#10;Без расширения — добавится .com автоматически."></textarea>
    <div class="textarea-hint">Один домен на строку. Максимум 500 за раз.</div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="btn-row">
      <button class="btn-primary" id="checkBtn" onclick="startCheck()">▶ Проверить</button>
      <button class="btn-secondary" onclick="clearAll()">Очистить</button>
      <span id="statusLine" class="status-line"></span>
    </div>
    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <div class="results-block" id="resultsBlock">
    <div class="config-block">
      <h2>// результаты</h2>
      <div class="stats-row">
        <div class="stat-pill stat-total" id="statTotal">Всего: 0</div>
        <div class="stat-pill stat-free" id="statFree">✓ Свободны: 0</div>
        <div class="stat-pill stat-taken" id="statTaken">✗ Заняты: 0</div>
      </div>
      <table class="results-table">
        <thead>
          <tr><th>Домен</th><th>Статус</th><th>Цена/год</th><th></th></tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
      <div class="export-row">
        <button class="btn-secondary" onclick="exportFree()">↓ Свободные .txt</button>
        <button class="btn-secondary" onclick="exportAll()">↓ Все результаты .csv</button>
      </div>
    </div>
  </div>
</div>

<script>
  let results = [];

  function parseDomains(raw) {
    return raw.split('\n')
      .map(d => d.trim().toLowerCase())
      .filter(d => d.length > 0)
      .map(d => !d.includes('.') ? d + '.com' : d)
      .filter((d, i, arr) => arr.indexOf(d) === i);
  }

  function setStatus(msg) { document.getElementById('statusLine').textContent = msg; }
  function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; }
  function hideError() { document.getElementById('errorMsg').style.display = 'none'; }
  function setProgress(val) { document.getElementById('progressBar').style.width = val + '%'; }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function startCheck() {
    hideError();
    const apiKey = document.getElementById('apiKey').value.trim();
    const apiSecret = document.getElementById('apiSecret').value.trim();
    const raw = document.getElementById('domainsInput').value;

    if (!apiKey || !apiSecret) { showError('Введи API Key и API Secret.'); return; }
    const domains = parseDomains(raw);
    if (domains.length === 0) { showError('Список доменов пустой.'); return; }

    results = [];
    document.getElementById('checkBtn').disabled = true;
    document.getElementById('resultsBlock').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'block';
    setProgress(0);

    const tbody = document.getElementById('resultsBody');
    tbody.innerHTML = '';
    domains.forEach(d => {
      results.push({ domain: d, status: 'checking', price: null });
      const tr = document.createElement('tr');
      tr.id = 'row-' + CSS.escape(d);
      tr.innerHTML = `<td class="domain-cell">${d}</td><td><span class="badge badge-checking">...</span></td><td>—</td><td></td>`;
      tbody.appendChild(tr);
    });

    document.getElementById('resultsBlock').style.display = 'block';
    updateStats();

    const BATCH = 50;
    let done = 0;

    for (let i = 0; i < domains.length; i += BATCH) {
      const batch = domains.slice(i, i + BATCH);
      setStatus(`Проверяю ${i + 1}–${Math.min(i + BATCH, domains.length)} из ${domains.length}...`);

      try {
        const url = `https://api.godaddy.com/v1/domains/available?domain=${encodeURIComponent(batch.join(','))}&checkType=FAST&forTransfer=false`;
        const response = await fetch(url, {
          headers: { 'Authorization': `sso-key ${apiKey}:${apiSecret}`, 'Accept': 'application/json' }
        });

        if (response.status === 401) { showError('Ошибка авторизации — проверь API Key и Secret.'); break; }
        if (response.status === 429) { showError('Rate limit — подожди минуту и попробуй снова.'); break; }

        const data = await response.json();
        let items = Array.isArray(data) ? data : data.domains ? data.domains : [data];

        items.forEach(item => {
          if (!item.domain) return;
          const price = item.price ? (item.price / 1000000).toFixed(2) : null;
          const st = item.available ? 'free' : 'taken';
          updateRow(item.domain, st, price);
          const r = results.find(x => x.domain === item.domain);
          if (r) { r.status = st; r.price = price; }
        });
      } catch (err) {
        batch.forEach(d => {
          updateRow(d, 'unknown', null);
          const r = results.find(x => x.domain === d);
          if (r) r.status = 'unknown';
        });
      }

      done += batch.length;
      setProgress(Math.round(done / domains.length * 100));
      updateStats();
      if (i + BATCH < domains.length) await sleep(700);
    }

    setStatus(`✓ Готово — проверено ${domains.length} доменов`);
    document.getElementById('checkBtn').disabled = false;
  }

  function updateRow(domain, status, price) {
    const row = document.getElementById('row-' + CSS.escape(domain));
    if (!row) return;
    const bc = status === 'free' ? 'badge-free' : status === 'taken' ? 'badge-taken' : 'badge-unknown';
    const bt = status === 'free' ? '✓ Свободен' : status === 'taken' ? '✗ Занят' : '? Ошибка';
    const ps = price ? `$${price}` : '—';
    const cb = status === 'free' ? `<button class="copy-btn" onclick="copyDomain('${domain}')">copy</button>` : '';
    row.innerHTML = `<td class="domain-cell">${domain}</td><td><span class="badge ${bc}">${bt}</span></td><td style="color:var(--muted)">${ps}</td><td>${cb}</td>`;
  }

  function updateStats() {
    document.getElementById('statTotal').textContent = `Всего: ${results.length}`;
    document.getElementById('statFree').textContent = `✓ Свободны: ${results.filter(r=>r.status==='free').length}`;
    document.getElementById('statTaken').textContent = `✗ Заняты: ${results.filter(r=>r.status==='taken').length}`;
  }

  function copyDomain(d) { navigator.clipboard.writeText(d); }

  function exportFree() {
    download('free-domains.txt', results.filter(r=>r.status==='free').map(r=>r.domain).join('\n'));
  }

  function exportAll() {
    const rows = ['domain,status,price', ...results.map(r=>`${r.domain},${r.status},${r.price||''}`)];
    download('domains-results.csv', rows.join('\n'));
  }

  function download(name, content) {
    const a = document.createElement('a');
    a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(content);
    a.download = name; a.click();
  }

  function clearAll() {
    document.getElementById('domainsInput').value = '';
    document.getElementById('resultsBlock').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'none';
    setStatus(''); hideError(); results = [];
  }
</script>
</body>
</html>
